version: '3.8'

services:
  app:
    container_name: farmus-backend
    image: ${DOCKER_USERNAME}/farmus-be:${IMAGE_TAG}
    network_mode: "host"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_MAP_API_KEY=${GOOGLE_MAP_API_KEY}
      - SWAGGER_SERVER_URL=${SWAGGER_SERVER_URL}
      - GDD_SERVICE_KEY=${GDD_SERVICE_KEY}
      - GDD_SCHEDULER_CRON=${GDD_SCHEDULER_CRON}
      - CAMERA_STREAM_PLAYBACK_BASE_URL=${CAMERA_STREAM_PLAYBACK_BASE_URL}
      - CAMERA_STREAM_TTL_MINUTES=${CAMERA_STREAM_TTL_MINUTES}
      - AI_INFERENCE_BASE_URL=${AI_INFERENCE_BASE_URL}
      - AI_INFERENCE_PREDICT_PATH=${AI_INFERENCE_PREDICT_PATH}
      - SPRING_APPLICATION_JSON={"file":{"upload-dir":"${FILE_UPLOAD_DIR}"}}
      - SERVER_ADDRESS=${SERVER_ADDRESS}
    restart: always

  ai-inference-a:
    container_name: kimphys-api-a
    image: ${AI_A_IMAGE}
    network_mode: "host"
    volumes:
      - /home/${USERNAME}/kimphys_api_a/app.py:/workspace/app.py:ro
      - /home/${USERNAME}/kimphys_api_a/models:/workspace/models:ro
    command: >
      bash -lc "apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libxcb1 &&
      rm -rf /var/lib/apt/lists/* &&
      pip uninstall -y opencv-python >/dev/null 2>&1 || true; pip install -q ujson fastapi uvicorn python-multipart ultralytics opencv-python-headless &&
      uvicorn app:app --host 0.0.0.0 --port 8001 --app-dir /workspace"
    restart: unless-stopped
