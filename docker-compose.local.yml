services:
  postgres:
    image: postgres:17-alpine
    container_name: farmus-postgres-local
    restart: unless-stopped
    ports:
      - "${DB_PORT_HOST:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-mydb}
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpass}
    volumes:
      - farmus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  farmus-postgres-data:
