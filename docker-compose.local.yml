services:
  postgres:
    image: postgres:17-alpine
    container_name: farmus-postgres-local
    restart: unless-stopped
    ports:
      - "${DB_PORT_HOST:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - farmus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-inference-a:
    profiles: ["ai"]
    image: ${AI_A_IMAGE:-kimphys/62_a:v2.0}
    container_name: kimphys-api-a-local
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ${LOCAL_AI_APP_PATH:-/tmp/kimphys_api_a/app.py}:/workspace/app.py:ro
      - ${LOCAL_AI_MODELS_PATH:-/tmp/kimphys_api_a/models}:/workspace/models:ro
    command: >
      bash -lc "apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libxcb1 &&
      rm -rf /var/lib/apt/lists/* &&
      pip uninstall -y opencv-python >/dev/null 2>&1 || true; pip install -q ujson fastapi uvicorn python-multipart ultralytics opencv-python-headless &&
      uvicorn app:app --host 0.0.0.0 --port 8001 --app-dir /workspace"

volumes:
  farmus-postgres-data:
