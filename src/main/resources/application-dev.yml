spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:mydb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

file:
  upload-dir: ${FILE_UPLOAD_DIR:/home/farmus_images/}

app:
  jwt:
    expiration-ms: 3600000
    secret: ${JWT_SECRET}
    access-ttl-minutes: 30

google:
  map:
    api-key: ${GOOGLE_MAP_API_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  paths-to-match: /auth/**,/users/**,/farms/**,/api/v1/crops/**

swagger:
  server-url: ${SWAGGER_SERVER_URL:http://localhost:8080}

gdd:
  api:
    base-url: https://apis.data.go.kr/1390802/AgriWeather/WeatherObsrInfo/GrwDay
    service-key: ${GDD_SERVICE_KEY}
  scheduler:
    cron: ${GDD_SCHEDULER_CRON:0 10 3 * * *}

camera:
  stream:
    default-url: ${CAMERA_STREAM_URL:}
    protocol: ${CAMERA_STREAM_PROTOCOL:MJPEG}
    ttl-minutes: ${CAMERA_STREAM_TTL_MINUTES:60}
