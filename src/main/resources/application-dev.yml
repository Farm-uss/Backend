spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:mydb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  address: ${SERVER_ADDRESS:0.0.0.0}

file:
  upload-dir: ${FILE_UPLOAD_DIR:/home/farmus_images/}
  default-img: ${FILE_DEFAULT_IMG}

app:
  jwt:
    expiration-ms: 3600000
    secret: ${JWT_SECRET}
    access-ttl-minutes: 30

google:
  map:
    api-key: ${GOOGLE_MAP_API_KEY}

openweather:
  api-key: ${OPENWEATHER_API_KEY}
  base-url: https://api.openweathermap.org
  cache-minutes: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

  paths-to-match: /auth/**,/users/**,/farms/**,/api/v1/crops/**,/api/v1/farms/**,/api/sensor-readings/**,/api/sensors/**,/api/env-data/**,/api/sensor-readings/**,/api/sensors/**,/api/devices/**,/api/led/**,/api/notifications/**,/api/crops-recommend/**,/api/schedules/**,/api/push/**,/api/farms/**,/api/chatbot/**

swagger:
  server-url: ${SWAGGER_SERVER_URL:http://localhost:8080}

gdd:
  api:
    base-url: https://apis.data.go.kr/1390802/AgriWeather/WeatherObsrInfo/GrwDay
    service-key: ${GDD_SERVICE_KEY}
  scheduler:
    cron: ${GDD_SCHEDULER_CRON:0 10 3 * * *}

camera:
  stream:
    playback-base-url: ${CAMERA_STREAM_PLAYBACK_BASE_URL:}
    ttl-minutes: ${CAMERA_STREAM_TTL_MINUTES:60}

ai:
  inference:
    base-url: ${AI_INFERENCE_BASE_URL:http://localhost:8001}
    predict-path: ${AI_INFERENCE_PREDICT_PATH:/predict}
    timeout-ms: ${AI_INFERENCE_TIMEOUT_MS:5000}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    bucket: ${AWS_S3_BUCKET}


vapid:
  public-key: ${VAPID_PUBLIC_KEY}
  private-key: ${VAPID_PRIVATE_KEY}
  subject: ${VAPID_SUBJECT}

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com
  model: gpt-5-mini