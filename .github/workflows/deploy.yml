name: FarmUs Backend Deploy

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Java 빌드 (Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      # Docker 이미지 빌드 및 푸시
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/farmus-be:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/farmus-be:latest

      # 서버 접속 및 배포 실행
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DB_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/app

            cat > .env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_HOST=localhost
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_MAP_API_KEY=${{ secrets.GOOGLE_MAP_API_KEY }}
            SWAGGER_SERVER_URL=${{ secrets.SWAGGER_SERVER_URL }}
            FILE_UPLOAD_DIR=${{ secrets.FILE_UPLOAD_DIR }}
            EOF

            docker-compose down || true
            docker-compose pull
            docker-compose up -d