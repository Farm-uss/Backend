name: FarmUs Backend Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/farmus-be
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (latest + commit SHA)
        run: |
          docker build \
            -t ${IMAGE_REPO}:latest \
            -t ${IMAGE_REPO}:${IMAGE_TAG} \
            .
          docker push ${IMAGE_REPO}:latest
          docker push ${IMAGE_REPO}:${IMAGE_TAG}

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DB_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/app

            cat > .env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            SPRING_PROFILES_ACTIVE=dev
            DB_HOST=localhost
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_MAP_API_KEY=${{ secrets.GOOGLE_MAP_API_KEY }}
            SWAGGER_SERVER_URL=${{ secrets.SWAGGER_SERVER_URL }}
            GDD_SERVICE_KEY=${{ secrets.GDD_SERVICE_KEY }}
            GDD_SCHEDULER_CRON=${{ secrets.GDD_SCHEDULER_CRON }}
            CAMERA_STREAM_URL=${{ secrets.CAMERA_STREAM_URL }}
            CAMERA_STREAM_PROTOCOL=${{ secrets.CAMERA_STREAM_PROTOCOL }}
            CAMERA_STREAM_TTL_MINUTES=${{ secrets.CAMERA_STREAM_TTL_MINUTES }}
            FILE_UPLOAD_DIR=${{ secrets.FILE_UPLOAD_DIR }}
            EOF

            cat > docker-compose.override.yml <<'EOF'
            version: '3.8'
            services:
              app:
                image: ${DOCKER_USERNAME}/farmus-be:${IMAGE_TAG}
            EOF

            docker-compose --env-file .env pull app
            docker-compose --env-file .env stop app || true
            docker-compose --env-file .env rm -f app || true
            docker-compose --env-file .env up -d app
            docker image prune -f
